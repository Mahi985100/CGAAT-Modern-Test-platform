{% extends 'base.html' %}
{% block title %}Register - CGAAT{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="container narrow">
    <div class="card form-card auth-card premium-hover auth-shell">
      <p class="eyebrow">Create account</p>
      <h1>Register</h1>
      <p>Create your account to access exams, reports, and your personal dashboard.</p>
      <form method="post" class="form-grid single">
        <div><label>Full Name</label><input type="text" name="name" required></div>
        <div><label>Email</label><input type="email" name="email" required></div>
        <div><label>Password</label><input type="password" name="password" required></div>
        <button class="btn btn-primary" type="submit">Create Account</button>
      </form>
      <p class="muted-line auth-foot-note">Already registered? <a href="{{ url_for('login') }}">Log in here</a></p>
    </div>
  </div>
</section>
{% endblock %}
